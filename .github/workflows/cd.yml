name: CD

on:
  push:
    branches: [main]

env:
  ACR_SERVER: crsentinelhe.azurecr.io
  ACR_NAME: crsentinelhe
  RESOURCE_GROUP: rg-sentinel-health-engine
  CAE_NAME: cae-sentinel-he

jobs:
  build-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - telemetry-service
          - health-rules-service
          - alerts-service

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR Login
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Compute image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build & Push image
        run: |
          IMAGE="${{ env.ACR_SERVER }}/${{ matrix.service }}"
          docker build \
            -t "${IMAGE}:${{ steps.meta.outputs.tag }}" \
            -t "${IMAGE}:latest" \
            -f "services/${{ matrix.service }}/Dockerfile" \
            .
          docker push "${IMAGE}:${{ steps.meta.outputs.tag }}"
          docker push "${IMAGE}:latest"

  deploy:
    name: Deploy (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: build-push
    strategy:
      fail-fast: false
      matrix:
        service:
          - telemetry-service
          - health-rules-service
          - alerts-service

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Container Apps
        run: |
          IMAGE="${{ env.ACR_SERVER }}/${{ matrix.service }}:${{ github.sha }}"
          az containerapp update \
            --name "${{ matrix.service }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --image "$IMAGE"

      - name: Verify deployment
        run: |
          az containerapp revision list \
            --name "${{ matrix.service }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query "[0].{name:name, state:properties.runningState, image:properties.template.containers[0].image}" \
            --output table
