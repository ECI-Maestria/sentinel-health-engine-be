name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    name: Build, Test & Coverage (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: telemetry-service
            coverage_out: coverage/telemetry.out
          - service: health-rules-service
            coverage_out: coverage/health-rules.out
          - service: alerts-service
            coverage_out: coverage/alerts.out

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/${{ matrix.service }}/go.mod
          cache-dependency-path: |
            services/${{ matrix.service }}/go.sum
            shared/go.sum

      - name: Build
        working-directory: services/${{ matrix.service }}
        run: go build ./...

      - name: Test with coverage
        working-directory: services/${{ matrix.service }}
        run: |
          mkdir -p ../../coverage
          go test ./... -v -count=1 -timeout 120s \
            -coverprofile=../../${{ matrix.coverage_out }} \
            -covermode=atomic

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.coverage_out }}
          retention-days: 1

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          merge-multiple: true
          path: coverage/

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
