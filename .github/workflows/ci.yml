name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - telemetry-service
          - health-rules-service
          - alerts-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/${{ matrix.service }}/go.mod
          cache-dependency-path: |
            services/${{ matrix.service }}/go.sum
            shared/go.sum

      - name: Build
        working-directory: services/${{ matrix.service }}
        run: go build ./...

      - name: Test
        working-directory: services/${{ matrix.service }}
        run: go test ./... -v -count=1 -timeout 120s
